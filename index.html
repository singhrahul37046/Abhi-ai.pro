<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Abhi-AI Pro - Chat with Claude</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .setup-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: none;
        }

        .setup-section.active {
            display: block;
        }

        .setup-section h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .setup-section p {
            margin-bottom: 15px;
            color: #666;
            font-size: 14px;
        }

        .setup-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .setup-section a:hover {
            text-decoration: underline;
        }

        .setup-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .setup-section button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .setup-section button:hover {
            background: #764ba2;
        }

        .setup-section button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .chat-container.active {
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user .message-content {
            background: #667eea;
            color: white;
            border-radius: 18px 18px 0 18px;
        }

        .ai .message-content {
            background: #f0f0f0;
            color: #333;
            border-radius: 18px 18px 18px 0;
        }

        .input-section {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .input-section input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-section button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-section button:hover {
            background: #764ba2;
        }

        .input-section button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #c33;
        }

        .logout-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
            display: none;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .logout-btn.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
            <h1>🤖 Abhi-AI Pro</h1>
            <p>Chat with Claude AI</p>
        </div>

        <!-- Setup Section -->
        <div class="setup-section active" id="setupSection">
            <h2>🔑 API Key Setup</h2>
            <p>
                Apna Anthropic API key enter karo. 
                <a href="https://console.anthropic.com/api/keys" target="_blank">👉 Key banao yahan</a>
            </p>
            <input 
                type="password" 
                id="apiKeyInput" 
                placeholder="sk-ant-xxxxxxxxxxxxx" 
                required
            >
            <button onclick="startChat()" id="connectBtn">✅ Connect</button>
            <div class="error" id="setupError" style="display:none;"></div>
        </div>

        <!-- Chat Section -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages"></div>
        </div>

        <div class="input-section" id="inputSection" style="display:none;">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Kuch bhi likho..." 
                onkeypress="handleEnter(event)"
            >
            <button onclick="sendMessage()" id="sendBtn">📤 Send</button>
        </div>
    </div>

    <script>
        let apiKey = "";
        let conversationHistory = [];

        async function startChat() {
            const keyInput = document.getElementById('apiKeyInput').value.trim();
            const setupError = document.getElementById('setupError');
            const connectBtn = document.getElementById('connectBtn');

            if (!keyInput) {
                setupError.textContent = "❌ API key zaruri hai!";
                setupError.style.display = 'block';
                return;
            }

            if (!keyInput.startsWith('sk-ant-')) {
                setupError.textContent = "❌ API key 'sk-ant-' se start hona chahiye!";
                setupError.style.display = 'block';
                return;
            }

            // Test the API key
            connectBtn.disabled = true;
            connectBtn.textContent = "⏳ Testing...";

            try {
                const testResponse = await fetch('/api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: "Hi" }],
                        apiKey: keyInput
                    })
                });

                if (!testResponse.ok) {
                    const error = await testResponse.json();
                    setupError.textContent = error.error || "❌ API key invalid hai!";
                    setupError.style.display = 'block';
                    connectBtn.disabled = false;
                    connectBtn.textContent = "✅ Connect";
                    return;
                }

                apiKey = keyInput;
                setupError.style.display = 'none';
                
                // Switch to chat view
                document.getElementById('setupSection').classList.remove('active');
                document.getElementById('chatContainer').classList.add('active');
                document.getElementById('inputSection').style.display = 'flex';
                document.getElementById('logoutBtn').classList.add('show');

                // Add welcome message
                addMessage("👋 Namaste! Main Abhi hoon, Claude AI. Kuch bhi pooch sakte ho!", 'ai');
                conversationHistory = [];
                
                document.getElementById('userInput').focus();
                connectBtn.disabled = false;
                connectBtn.textContent = "✅ Connect";
            } catch (error) {
                setupError.textContent = `❌ Network Error: ${error.message}`;
                setupError.style.display = 'block';
                connectBtn.disabled = false;
                connectBtn.textContent = "✅ Connect";
            }
        }

        function logout() {
            apiKey = "";
            conversationHistory = [];
            document.getElementById('setupSection').classList.add('active');
            document.getElementById('chatContainer').classList.remove('active');
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('logoutBtn').classList.remove('show');
            document.getElementById('apiKeyInput').value = '';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('setupError').style.display = 'none';
            document.getElementById('apiKeyInput').focus();
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        async function sendMessage() {
            const userInput = document.getElementById('userInput').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            
            if (!userInput) return;

            if (!apiKey) {
                alert("Pehle API key setup karo!");
                return;
            }

            // Add user message
            addMessage(userInput, 'user');
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').focus();

            // Add to conversation history
            conversationHistory.push({
                role: "user",
                content: userInput
            });

            // Show loading
            const loadingId = 'loading-' + Date.now();
            addLoadingMessage(loadingId);
            sendBtn.disabled = true;

            try {
                // Call backend API
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: conversationHistory,
                        apiKey: apiKey
                    })
                });

                const data = await response.json();

                // Remove loading message
                removeLoadingMessage(loadingId);
                sendBtn.disabled = false;

                if (!response.ok) {
                    if (response.status === 401) {
                        addMessage("❌ API key invalid hai! Sahi key daal ke dubara try karo.", 'ai');
                        logout();
                    } else {
                        addMessage(`❌ Error: ${data.error || 'Kuch galat ho gaya'}`, 'ai');
                    }
                    return;
                }

                const aiMessage = data.message;
                addMessage(aiMessage, 'ai');

                // Add to conversation history
                conversationHistory.push({
                    role: "assistant",
                    content: aiMessage
                });

            } catch (error) {
                removeLoadingMessage(loadingId);
                sendBtn.disabled = false;
                addMessage(`❌ Network Error: ${error.message}`, 'ai');
            }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addLoadingMessage(id) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = id;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'loading';
            contentDiv.innerHTML = '<span>Soch raha hoon</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeLoadingMessage(id) {
            const element = document.getElementById(id);
            if (element) element.remove();
        }

        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Focus on input after setup
        window.addEventListener('load', () => {
            document.getElementById('apiKeyInput').focus();
        });
    </script>
</body>
</html>
